<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lkm Shop</title>
    <link rel="stylesheet" href="./CSS/bootstrap.css" />
    <link rel="stylesheet" href="./CSS/index.css" />
    <script src="./JS/bootstrap.bundle.min.js"></script>
    <script src="./JS/index.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poor+Story&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dongle&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'KimjungchulGothic-Bold';
            font-weight: 500;
        }

        @font-face {
            font-family: 'KimjungchulGothic-Bold';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/KimjungchulGothic-Bold.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        body {
            width: 100vw;
        }

        #login_form {
            width: 300px;
            border: 1px solid white;
            border-radius: 0.1cm;
            background-color: rgb(244, 243, 243);
            margin-top: 30px;
            

        }
     
        #login_submit,
        #login_index {
            font-size: 16px;
            width: 110px;
            background-color: #19ce60;
            color: white;
        }

        #member-email,
        #member_password {
            width: 230px;

            margin: 0 auto;

        }
        .msg{
            font-size:13px;
            margin-bottom: 3px;
        }
        #logtitle{
            font-size: 23px;
            color: rgb(26, 116, 207);
        }
    </style>
</head>

<body>

    <!-- onsubmit: form에 작성한 정보를 제출(submit) 할 때 호출할 
        함수 return을 작성하여 함수 호출 결과가 true,false인지에 따라 제출을 제어 할 수 있음 //"return login_check()" -->
    <form action="#" name="loginForm" method="post" onsubmit="return login_check()">
        <div id="login_form" class="container">
            <div class="container text-center mt-4 mb-3">
                <span id="logtitle">lkm shop 로그인</span>
            </div>
            <div id="login_frame" class="form-control">
                <span>아이디 :</span>

                <input type="text" name="memberEmail" id="member-email" class="form-control text-center">

                <span id="email-result"class="msg"></span><br>
                <span>비밀번호 :</span>
                <input type="text" name="memberPassword" id="member_password" class="form-control text-center">
                <span id="m_password" class="msg"></span><br>
                <div class=row>
                    <div class="col">
                        <input type="submit" value=" 로그인 " id="login_submit" class="btn btn-outline-success">
                    </div>
                    <div class="col">
                        <input type="button" value="회원가입" id="login_index" class="btn btn-outline-success"
                            onclick="goMemreg()">
                    </div>
                    <span id="chkresult1"></span><br>
                </div>
            </div>
        </div>

    </form>
</body>
<script>
    
    const email_chk = () => {
        const email = document.getElementById("member-email").value;
        const resultmsg = document.getElementById("email-result");
        console.log(email);
        if (email.length < 1) {
            resultmsg.innerHTML = "필수입력사항입니다. "
            resultmsg.style.color = "red";
            return false;
        } else if (email.length < 5 || email.length >= 20) {
            resultmsg.innerHTML = "입력가능한 글자수는 5~20자입니다. "
            resultmsg.style.color = "red";
            return false;
        } else {
            resultmsg.innerHTML = "좋은 아이디 "
            resultmsg.style.color = "green";
            return true;
        }
    }
    const password_chk = () => {
        const password = document.getElementById("member_password").value;
        const passwordchk = document.getElementById("m_password");
        console.log(password);
        if (password.length < 1) {
            console.log(password.length);
            passwordchk.innerHTML = "필수입력사항입니다 "
            passwordchk.style.color = "red";
            return false;
        } else if (password.length < 8 || password.length > 16) {
            passwordchk.innerHTML = "8~16자로 입력해주세요"
            passwordchk.style.color = "red";
            return false;

        } else {
            passwordchk.innerHTML = "좋아요"
            passwordchk.style.color = "green";
            return true;
        }
    }
    const login_check = () => {
        //email, password중에 하나라도 입력되지 않았으면 submit을 하지 않고
        //입력하지 않은 항목에 focus를 줌
        const email = document.getElementById("member-email");
        const password = document.getElementById("member_password");
        if (!email_chk()) {
            //email 입력에 focus
            email.focus();
            return false;
        } else if (!password_chk()) {
            password.focus();
            return false;
        } else {
            return true;
        }

    }
</script>

</html>
